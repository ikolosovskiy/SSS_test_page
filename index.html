<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS-UA | Важливі посилання</title>
    <!-- Підключаємо Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- Хедер з логотипом -->
    <header class="w-full max-w-md text-center my-6 px-2">
        <div class="w-full flex items-center justify-center">
            <img src="./1-02.png" alt="SSS Logo" class="w-full h-auto object-contain">
        </div>
    </header>

    <!-- Навігація / Інтерактивні вкладки (генеруються динамічно через JS) -->
    <div id="tabs-container" class="w-full max-w-md flex border-b mb-6 text-sm font-bold">
        <!-- Сюди додаватимуться кнопки категорій -->
    </div>

    <!-- Основний контейнер для карток -->
    <main id="content-container" class="w-full max-w-md space-y-4">
        <!-- Сюди рендеритимуться картки для вибраної категорії -->
    </main>

    <!-- Футер -->
    <footer class="mt-8 text-xs text-gray-400">
        © 2026 БФ «Стабілізейшен Суппорт Сервісез»
    </footer>

    <!-- Підключаємо зовнішній файл з даними -->
    <script src="data.js"></script>

    <!-- Скрипт динамічного рендерингу -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof SSS_DATA === 'undefined') {
                console.error("Помилка: Файл data.js не знайдено або він завантажився невірно.");
                return;
            }

            const colorMap = {
                blue: { text: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-600' },
                yellow: { text: 'text-yellow-600', bg: 'bg-yellow-50', border: 'border-yellow-600' },
                green: { text: 'text-green-600', bg: 'bg-green-50', border: 'border-green-600' },
                purple: { text: 'text-purple-600', bg: 'bg-purple-50', border: 'border-purple-600' },
                red: { text: 'text-red-600', bg: 'bg-red-50', border: 'border-red-600' },
                gray: { text: 'text-gray-600', bg: 'bg-gray-50', border: 'border-gray-600' }
            };

            const now = new Date();
            let activeTab = 'news';

            // 1. Попередня обробка даних: перевірка дати закінчення (expireDate)
            const processedItems = SSS_DATA.items.map(item => {
                let currentCategory = item.category;
                let isExpired = false;

                if (item.expireDate) {
                    const expireDate = new Date(item.expireDate);
                    // Якщо дата закінчення минула (порівняння за датами)
                    if (expireDate < now) {
                        currentCategory = 'archive';
                        isExpired = true;
                    }
                }

                return {
                    ...item,
                    currentCategory,
                    isExpired
                };
            });

            // 2. Функція відображення карток
            function renderItems() {
                const container = document.getElementById('content-container');
                container.innerHTML = '';

                const filtered = processedItems.filter(item => item.currentCategory === activeTab);

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="text-center text-gray-400 py-8 text-sm">
                            Наразі немає інформації у цьому розділі.
                        </div>`;
                    return;
                }

                filtered.forEach(item => {
                    const colors = colorMap[item.tagColor] || colorMap.blue;
                    let cardHTML = '';

                    // Якщо є посилання на реєстрацію (regUrl) — будуємо картку з двома кнопками
                    if (item.regUrl) {
                        cardHTML = `
                            <div onclick="if (!event.target.closest('a') && !event.target.closest('button')) window.open('${item.url}', '_blank')"
                                 class="block bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md hover:scale-[1.01] transition-all duration-200 cursor-pointer">
                                <div class="p-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-28 aspect-[547/318] bg-gray-100 rounded-lg flex-shrink-0 overflow-hidden border border-gray-100">
                                            <img class="w-full h-full object-cover" src="${item.image}" alt="${item.title}">
                                        </div>
                                        <div class="flex-grow">
                                            <span class="text-[10px] uppercase tracking-wider font-bold ${colors.text} ${colors.bg} px-2 py-0.5 rounded">${item.tag}</span>
                                            <h3 class="font-semibold text-sm mt-1.5 leading-snug text-gray-900">${item.title}</h3>
                                        </div>
                                    </div>
                                    <div class="mt-4 flex gap-2 border-t pt-3">
                                        <a href="${item.url}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 border ${colors.border} ${colors.text} rounded-lg hover:bg-gray-50 transition">
                                            Детальніше
                                        </a>
                                        ${item.isExpired ? `
                                            <button disabled class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-gray-200 text-gray-500 rounded-lg cursor-not-allowed">
                                                Завершено
                                            </button>
                                        ` : `
                                            <a href="${item.regUrl}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                                Зареєструватись
                                            </a>
                                        `}
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Звичайна картка-посилання (наприклад, для новин чи матеріалів)
                        cardHTML = `
                            <a href="${item.url}" target="_blank" 
                               class="block bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md hover:scale-[1.01] transition-all duration-200">
                                <div class="p-4 flex items-center gap-4">
                                    <div class="w-28 aspect-[547/318] bg-gray-100 rounded-lg flex-shrink-0 overflow-hidden border border-gray-100">
                                        <img class="w-full h-full object-cover" src="${item.image}" alt="${item.title}">
                                    </div>
                                    <div class="flex-grow">
                                        <span class="text-[10px] uppercase tracking-wider font-bold ${colors.text} ${colors.bg} px-2 py-0.5 rounded">${item.tag}</span>
                                        <h3 class="font-semibold text-sm mt-1.5 leading-snug text-gray-900">${item.title}</h3>
                                    </div>
                                </div>
                            </a>
                        `;
                    }

                    container.insertAdjacentHTML('beforeend', cardHTML);
                });
            }

            // 3. Функція побудови вкладок навігації
            function renderTabs() {
                const tabsContainer = document.getElementById('tabs-container');
                tabsContainer.innerHTML = '';

                // Отримуємо список лише тих категорій, у яких є хоча б одна картка
                const availableCategories = Object.keys(SSS_DATA.categories).filter(catId => {
                    return processedItems.some(item => item.currentCategory === catId);
                });

                // Якщо поточна активна вкладка порожня — вибираємо першу доступну
                if (!availableCategories.includes(activeTab) && availableCategories.length > 0) {
                    activeTab = availableCategories[0];
                }

                availableCategories.forEach(catId => {
                    const isActive = catId === activeTab;
                    const btnClass = isActive 
                        ? "flex-1 text-center pb-2 text-blue-600 border-b-2 border-blue-600 transition-all focus:outline-none"
                        : "flex-1 text-center pb-2 text-gray-500 hover:text-blue-600 transition-all focus:outline-none";

                    const buttonHTML = `
                        <button onclick="window.switchTab('${catId}')" class="${btnClass}">
                            ${SSS_DATA.categories[catId]}
                        </button>
                    `;
                    tabsContainer.insertAdjacentHTML('beforeend', buttonHTML);
                });
            }

            // Глобальний метод для зміни вкладки
            window.switchTab = function(catId) {
                activeTab = catId;
                renderTabs();
                renderItems();
            }

            // Перший запуск
            renderTabs();
            renderItems();
        });
    </script>
</body>
</html>
