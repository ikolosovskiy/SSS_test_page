<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS-UA | Важливі посилання</title>
    <!-- Підключаємо Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Підключаємо бібліотеку Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Налаштування фірмових та акцентних кольорів організації в Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#214e34',     // Зелений (активна вкладка)
                        accentGold: '#e09f3e',  // Жовтий / Золотий
                        navy: '#021538',        // Темно-синій
                        crimson: '#9d292b'      // Червоний
                    }
                }
            }
        }
    </script>
    <style>
        /* Стиль для елемента, який перетягують */
        .dragging {
            opacity: 0.5;
            border: 2px dashed #214e34;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- Панель адміна (показується тільки коли авторизовано) -->
    <div id="admin-bar" class="w-full max-w-md bg-navy text-white text-xs px-4 py-2.5 rounded-xl mb-4 hidden flex items-center justify-between shadow-md">
        <span class="font-semibold flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Режим адміна
        </span>
        <div class="flex gap-2">
            <button onclick="openModal()" class="bg-primary hover:bg-opacity-90 px-3 py-1 rounded font-bold transition">
                + Додати
            </button>
            <button onclick="logout()" class="bg-crimson hover:bg-opacity-90 px-3 py-1 rounded font-bold transition">
                Вийти
            </button>
        </div>
    </div>

    <!-- Хедер з логотипом та кнопкою Увійти (для кнопки додано z-30) -->
    <header class="w-full max-w-md flex flex-col items-center my-4 px-2 relative">
        <button id="login-btn" onclick="openLoginModal()" class="absolute right-2 top-0 z-30 text-xs border border-primary text-primary hover:bg-primary hover:text-white px-3 py-1.5 rounded-lg font-bold transition">
            Увійти
        </button>
        <div class="w-full flex items-center justify-center mt-8">
            <img src="./1-02.png" alt="SSS Logo" class="w-full h-auto max-h-24 object-contain" onerror="this.src='https://sss-ua.org/wp-content/uploads/2022/11/logo_main.png'">
        </div>
    </header>

    <!-- Навігація / Інтерактивні вкладки (генеруються динамічно через JS) -->
    <div id="tabs-container" class="w-full max-w-md flex border-b mb-6 text-sm font-bold"></div>

    <!-- Основний контейнер для карток (без overflow-hidden, щоб меню не обрізалося) -->
    <main id="content-container" class="w-full max-w-md space-y-4"></main>

    <!-- Футер -->
    <footer class="mt-12 mb-6 text-xs text-gray-400 text-center">
        © 2026 БФ «Стабілізейшен Суппорт Сервісез»
    </footer>

    <!-- ================= МОДАЛЬНЕ ВІКНО: ВХІД ================= -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl">
            <h3 class="font-bold text-lg text-navy mb-4 text-center">Вхід в адмін-панель</h3>
            <input type="password" id="admin-password" placeholder="Введіть пароль" class="w-full border p-2.5 rounded-lg mb-4 text-sm focus:outline-none focus:border-primary">
            <div id="login-error" class="text-xs text-crimson mb-3 hidden text-center">Невірний пароль!</div>
            <div class="flex gap-2">
                <button onclick="closeLoginModal()" class="flex-1 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg font-semibold transition">Скасувати</button>
                <button onclick="login()" class="flex-1 py-2 text-sm bg-primary text-white rounded-lg font-semibold hover:bg-opacity-90 transition">Увійти</button>
            </div>
        </div>
    </div>

    <!-- ================= МОДАЛЬНЕ ВІКНО: ДОДАННЯ / РЕДАГУВАННЯ ================= -->
    <div id="item-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden overflow-y-auto">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl my-8">
            <h3 id="modal-title" class="font-bold text-lg text-navy mb-4">Додати посилання</h3>
            
            <input type="hidden" id="edit-id">

            <div class="space-y-4 text-sm">
                <div>
                    <label class="block font-semibold mb-1 text-gray-700">Заголовок новини чи заходу</label>
                    <input type="text" id="item-title" placeholder="Введіть заголовок" class="w-full border p-2.5 rounded-lg focus:outline-none focus:border-primary">
                </div>

                <div>
                    <label class="block font-semibold mb-1 text-gray-700">Посилання</label>
                    <input type="url" id="item-url" placeholder="https://example.com" class="w-full border p-2.5 rounded-lg focus:outline-none focus:border-primary">
                </div>

                <div>
                    <label class="block font-semibold mb-1 text-gray-700">Категорія</label>
                    <select id="item-category" class="w-full border p-2.5 rounded-lg focus:outline-none focus:border-primary">
                        <option value="news">Новини</option>
                        <option value="events">Реєстрація</option>
                        <option value="materials">Корисні матеріали</option>
                    </select>
                </div>

                <div class="border-t pt-3">
                    <label class="block font-semibold mb-1 text-gray-700 flex justify-between items-center">
                        <span>Завантажити фото</span>
                        <span class="text-xs text-gray-400 font-normal">Файл або URL</span>
                    </label>
                    <input type="file" id="item-file" accept="image/*" onchange="previewUploadedImage(event)" class="w-full border p-1 rounded-lg text-xs file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-primary file:text-white hover:file:bg-opacity-90">
                    <div class="text-center my-2 text-xs text-gray-400">- або вставте URL картинки -</div>
                    <input type="url" id="item-image-url" oninput="previewUrlImage()" placeholder="https://example.com/photo.jpg" class="w-full border p-2.5 rounded-lg text-xs focus:outline-none focus:border-primary">
                    
                    <!-- Попередній перегляд -->
                    <div class="mt-3 flex items-center gap-4 border p-2 rounded-lg bg-gray-50">
                        <div class="w-16 aspect-[547/318] bg-gray-200 rounded overflow-hidden flex-shrink-0">
                            <img id="img-preview" src="" class="w-full h-full object-cover hidden" alt="Preview">
                        </div>
                        <span id="preview-text" class="text-xs text-gray-400">Зображення не вибрано</span>
                    </div>
                </div>

                <div class="border-t pt-3">
                    <label class="block font-semibold mb-1 text-gray-700 flex items-center gap-1.5">
                        Посилання на реєстрацію <span class="text-xs text-gray-400 font-normal">(опціонально)</span>
                    </label>
                    <input type="url" id="item-reg-url" placeholder="Для вкладки реєстрацій (якщо потрібна кнопка)" class="w-full border p-2.5 rounded-lg focus:outline-none focus:border-primary">
                </div>

                <div>
                    <label class="block font-semibold mb-1 text-gray-700 flex items-center gap-1.5">
                        Дата завершення події <span class="text-xs text-gray-400 font-normal">(опціонально)</span>
                    </label>
                    <input type="date" id="item-expire" class="w-full border p-2.5 rounded-lg focus:outline-none focus:border-primary">
                </div>
            </div>

            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg font-semibold transition">Скасувати</button>
                <button id="save-btn" onclick="saveItem()" class="flex-1 py-2 text-sm bg-primary text-white rounded-lg font-semibold hover:bg-opacity-90 transition">Зберегти</button>
            </div>
        </div>
    </div>

    <!-- ================= СЛУЖБОВІ СКРИПТИ ================= -->
    <script>
        // ІНТЕГРОВАНО КЛЮЧІ З ВАШОГО АКАУНТУ SUPABASE
        const SUPABASE_URL = "https://djxgjmftmmlrwofrglos.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_BGyc87lQIPlziBbIC2A_PQ_pGnlthMw";

        // Безпечна ініціалізація клієнта Supabase (без конфліктів)
        let supabaseClient = null;
        try {
            if (SUPABASE_URL.includes("ВАШ_ПРОЄКТ") || SUPABASE_ANON_KEY.includes("ВАШ_ПУБЛІЧНИЙ_ANON_KEY")) {
                console.warn("Увага: Ключі Supabase не налаштовано. Працює локальний демо-режим.");
            } else {
                const { createClient } = supabase;
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (e) {
            console.error("Не вдалося ініціалізувати Supabase:", e);
        }

        // ДЕФОЛТНІ ДАНІ (для автоматичного заповнення під час першого запуску)
        const DEFAULT_ITEMS = [
            {
                id: "1",
                title: "Допомога для Бериславської громади, яка живе під обстрілами",
                category: "news",
                url: "https://sss-ua.org/news/dopomoha-dlia-beryslavskoi-hromady-iaka-zhyve-pid-obstrilamy/",
                image: "https://sss-ua.org/wp-content/uploads/2026/05/Bereslaska-hromada.jpg"
            },
            {
                id: "2",
                title: "Послуги з шиття: як хаб у Миколаєві допомагає постраждалому населенню",
                category: "news",
                url: "https://sss-ua.org/news/posluhy-z-shyttia-yak-khab-u-myколаievi-dopomahaie-postrazhdalomu-naselenniu/",
                image: "https://sss-ua.org/wp-content/uploads/2026/05/pani-larisa-768x1024.jpg"
            },
            {
                id: "3",
                title: "Як взяти участь у форумі Рад ВПО?",
                category: "events",
                url: "https://sss-ua.org/yak-vziaty-uchast-u-forumi-rad-vpo/",
                regUrl: "https://docs.google.com/forms/d/e/1FAIpQLSfwA3l1T40rU98abvij3HM8A-cFobo4mhfAeZnio-vxS-vMMQ/viewform",
                image: "https://sss-ua.org/wp-content/uploads/2025/04/YAk-vziaty-uchast_rozdil_Forum_Rad_VPO_1200x630_eng-copy-6-1.png",
                expireDate: "2026-06-15"
            },
            {
                id: "4",
                title: "Матеріали для навчання координаторів гуманітарних штабів",
                category: "materials",
                url: "https://sss-ua.org/",
                image: "https://sss-ua.org/wp-content/uploads/2026/04/seriia-6_ua_856x450-1024x538.png"
            }
        ];

        const CATEGORIES = {
            news: "Новини",
            events: "Реєстрація",
            materials: "Корисні матеріали",
            archive: "Архів"
        };

        let items = [];
        let processedItems = [];
        let activeTab = 'news';
        let isAdmin = false;
        let activeDropdownId = null;
        let localUploadedFile = null;

        // Запускаємо ініціалізацію миттєво (оскільки скрипт розміщений внизу body, DOM вже повністю готовий)
        (async () => {
            if (sessionStorage.getItem('sss_is_admin') === 'true') {
                enableAdminMode();
            }
            await fetchItems();
        })();

        // Завантаження даних з Supabase
        async function fetchItems() {
            if (!supabaseClient) {
                console.log("Завантаження дефолтних посилань (локальний режим)...");
                items = DEFAULT_ITEMS;
                processDataAndRender();
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('hub_items')
                    .select('*')
                    .order('position', { ascending: true });

                if (error) {
                    console.error("Помилка зв'язку з Supabase, завантажуємо локальний бекап:", error);
                    items = DEFAULT_ITEMS;
                    processDataAndRender();
                    return;
                }

                // Якщо таблиця в Supabase ще порожня, завантажуємо туди дефолтний контент
                if (data.length === 0) {
                    console.log("База даних порожня. Запускаємо автозаповнення демо-даними...");
                    
                    const seedData = DEFAULT_ITEMS.map((item, idx) => ({
                        title: item.title,
                        url: item.url,
                        category: item.category,
                        image: item.image,
                        reg_url: item.regUrl || null,
                        expire_date: item.expireDate || null,
                        position: idx
                    }));

                    const { data: seededData, error: seedError } = await supabaseClient
                        .from('hub_items')
                        .insert(seedData)
                        .select();

                    if (seedError) {
                        console.error("Не вдалося виконати автозаповнення:", seedError);
                        items = DEFAULT_ITEMS;
                    } else {
                        items = seededData.map(row => ({
                            id: row.id,
                            title: row.title,
                            url: row.url,
                            category: row.category,
                            image: row.image,
                            regUrl: row.reg_url,
                            expireDate: row.expire_date,
                            position: row.position
                        }));
                    }
                } else {
                    items = data.map(row => ({
                        id: row.id,
                        title: row.title,
                        url: row.url,
                        category: row.category,
                        image: row.image,
                        regUrl: row.reg_url,
                        expireDate: row.expire_date,
                        position: row.position
                    }));
                }
            } catch (dbErr) {
                console.error("Помилка роботи з БД, увімкнено резервний режим:", dbErr);
                items = DEFAULT_ITEMS;
            }

            processDataAndRender();
        }

        // Обробка дат та сортування (ліміт 10 елементів на категорію, старіші летять в архів)
        function processDataAndRender() {
            const now = new Date();
            const categoryCounts = { news: 0, events: 0, materials: 0 };

            processedItems = items.map(item => {
                let currentCategory = item.category;
                let isExpired = false;

                if (item.expireDate) {
                    const expire = new Date(item.expireDate);
                    if (expire < now) {
                        isExpired = true;
                    }
                }

                if (isExpired) {
                    currentCategory = 'archive';
                } else {
                    if (categoryCounts[item.category] < 10) {
                        categoryCounts[item.category]++;
                    } else {
                        currentCategory = 'archive'; // Понад 10 посилань у вкладці автоматично йдуть в архів
                    }
                }

                return { ...item, currentCategory, isExpired };
            });

            // Рендеринг вкладок (тепер вони завжди стабільні та не зникають, навіть якщо порожні)
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            // Завжди відображаємо всі 4 категорії, визначені у константі CATEGORIES
            const visibleCategories = Object.keys(CATEGORIES);

            if (!visibleCategories.includes(activeTab) && visibleCategories.length > 0) {
                activeTab = visibleCategories[0];
            }

            visibleCategories.forEach(catId => {
                const isActive = catId === activeTab;
                const activeClasses = "text-primary border-b-2 border-primary";
                const inactiveClasses = "text-gray-500 hover:text-primary";
                
                const btn = document.createElement('button');
                btn.className = `flex-1 text-center pb-2 transition-all focus:outline-none ${isActive ? activeClasses : inactiveClasses}`;
                btn.textContent = CATEGORIES[catId];
                btn.onclick = () => {
                    activeTab = catId;
                    renderTabs();
                    renderCards();
                };
                container.appendChild(btn);
            });
        };
            renderCards();
        }

        // Рендеринг вкладок
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            const visibleCategories = Object.keys(CATEGORIES).filter(catId => {
                return processedItems.some(item => item.currentCategory === catId);
            });

            if (!visibleCategories.includes(activeTab) && visibleCategories.length > 0) {
                activeTab = visibleCategories[0];
            }

            visibleCategories.forEach(catId => {
                const isActive = catId === activeTab;
                const activeClasses = "text-primary border-b-2 border-primary";
                const inactiveClasses = "text-gray-500 hover:text-primary";
                
                const btn = document.createElement('button');
                btn.className = `flex-1 text-center pb-2 transition-all focus:outline-none ${isActive ? activeClasses : inactiveClasses}`;
                btn.textContent = CATEGORIES[catId];
                btn.onclick = () => {
                    activeTab = catId;
                    renderTabs();
                    renderCards();
                };
                container.appendChild(btn);
            });
        }

        // Рендеринг карток
        function renderCards() {
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            const filtered = processedItems.filter(item => item.currentCategory === activeTab);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-12 text-sm">Тут поки нічого немає...</div>`;
                return;
            }

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "relative bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:scale-[1.01] transition-all duration-200 cursor-pointer";
                
                if (isAdmin) {
                    card.setAttribute('draggable', 'true');
                    card.addEventListener('dragstart', (e) => handleDragStart(e, index));
                    card.addEventListener('dragover', handleDragOver);
                    card.addEventListener('drop', (e) => handleDrop(e, index));
                    card.addEventListener('dragend', handleDragEnd);
                }

                card.onclick = (e) => {
                    if (e.target.closest('.admin-control') || e.target.closest('a') || e.target.closest('button')) return;
                    window.open(item.url, '_blank');
                };

                let actionButtons = '';
                if (item.regUrl) {
                    actionButtons = `
                        <div class="mt-4 flex gap-2 border-t pt-3 admin-control">
                            <a href="${item.url}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 border border-primary text-primary rounded-lg hover:bg-gray-50 transition">
                                Детальніше
                            </a>
                            ${item.isExpired ? `
                                <button disabled class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-gray-200 text-gray-400 rounded-lg cursor-not-allowed">
                                    Завершено
                                </button>
                            ` : `
                                <a href="${item.regUrl}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-primary text-white rounded-lg hover:bg-opacity-95 transition">
                                    Зареєструватись
                                </a>
                            `}
                        </div>
                    `;
                }

                const adminMenuHTML = isAdmin ? `
                    <div class="absolute right-2 top-2 admin-control z-20">
                        <button onclick="toggleDropdown(event, '${item.id}')" class="p-1 rounded-full hover:bg-gray-100 text-gray-500 hover:text-gray-800 transition focus:outline-none">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                        </button>
                        <div id="dropdown-${item.id}" class="hidden absolute right-0 mt-1 w-28 bg-white border border-gray-200 rounded-lg shadow-xl text-xs overflow-hidden z-30">
                            <button onclick="editItem('${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-100 text-navy font-semibold border-b border-gray-100">Редагувати</button>
                            <button onclick="deleteItem('${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-50 text-crimson font-semibold border-b border-gray-100">Видалити</button>
                            <button onclick="toggleDropdown(event, '${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-50 text-gray-400 font-semibold">Скасувати</button>
                        </div>
                    </div>
                    <div class="absolute left-2 top-2 text-gray-300 admin-control pointer-events-none">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9 11H7V9h2v2zm4-2h-2v2h2V9zm4 0h-2v2h2V9zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"></path></svg>
                    </div>
                ` : '';

                card.innerHTML = `
                    ${adminMenuHTML}
                    <div class="p-4 ${isAdmin ? 'pl-8' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-24 aspect-[547/318] bg-gray-100 rounded-lg flex-shrink-0 overflow-hidden border border-gray-100">
                                <img class="w-full h-full object-cover" src="${item.image}" alt="${item.title}" onerror="this.src='https://placehold.co/547x318/f3f4f6/9ca3af?text=No+Photo'">
                            </div>
                            <div class="flex-grow">
                                <h3 class="font-semibold text-sm leading-snug text-gray-900">${item.title}</h3>
                            </div>
                        </div>
                        ${actionButtons}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ================= АВТОРИЗАЦІЯ =================
        function openLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('admin-password').focus();
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('admin-password').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function login() {
            const pass = document.getElementById('admin-password').value;
            // Стандартний пароль
            if (pass === 'admin') {
                sessionStorage.setItem('sss_is_admin', 'true');
                enableAdminMode();
                closeLoginModal();
                processDataAndRender();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // Вихід
        function logout() {
            sessionStorage.removeItem('sss_is_admin');
            isAdmin = false;
            document.getElementById('admin-bar').classList.add('hidden');
            document.getElementById('login-btn').classList.remove('hidden');
            processDataAndRender();
        }

        function enableAdminMode() {
            isAdmin = true;
            document.getElementById('admin-bar').classList.remove('hidden');
            document.getElementById('login-btn').classList.add('hidden');
        }

        // ================= DRAG & DROP СОРТУВАННЯ =================
        let draggedIndex = null;

        function handleDragStart(e, index) {
            draggedIndex = index;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) { e.preventDefault(); }

        async function handleDrop(e, targetIndex) {
            e.preventDefault();
            if (draggedIndex === null || draggedIndex === targetIndex) return;

            const activeItems = processedItems.filter(i => i.currentCategory === activeTab);
            const draggedItem = activeItems[draggedIndex];
            const targetItem = activeItems[targetIndex];

            const globalDraggedIdx = items.findIndex(i => i.id === draggedItem.id);
            const globalTargetIdx = items.findIndex(i => i.id === targetItem.id);

            if (globalDraggedIdx !== -1 && globalTargetIdx !== -1) {
                const [removed] = items.splice(globalDraggedIdx, 1);
                items.splice(globalTargetIdx, 0, removed);

                const updates = items.map((item, idx) => ({
                    id: item.id,
                    title: item.title,
                    url: item.url,
                    category: item.category,
                    image: item.image,
                    reg_url: item.regUrl || null,
                    expire_date: item.expireDate || null,
                    position: idx
                }));

                if (supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('hub_items').upsert(updates);
                        if (error) console.error("Помилка збереження сортування:", error);
                    } catch (dragErr) {
                        console.error("Помилка збереження позицій в БД:", dragErr);
                    }
                }

                processDataAndRender();
            }
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedIndex = null;
        }

        // ================= КЕРУВАННЯ МЕНЮ КАРТКИ =================
        function toggleDropdown(e, itemId) {
            e.stopPropagation();
            const targetDropdown = document.getElementById(`dropdown-${itemId}`);
            
            if (activeDropdownId && activeDropdownId !== itemId) {
                const prev = document.getElementById(`dropdown-${activeDropdownId}`);
                if (prev) prev.classList.add('hidden');
            }

            if (targetDropdown) {
                targetDropdown.classList.toggle('hidden');
                activeDropdownId = targetDropdown.classList.contains('hidden') ? null : itemId;
            }
        }

        document.addEventListener('click', () => {
            if (activeDropdownId) {
                const dropdown = document.getElementById(`dropdown-${activeDropdownId}`);
                if (dropdown) dropdown.classList.add('hidden');
                activeDropdownId = null;
            }
        });

        // ================= МОДАЛКА ЗБЕРЕЖЕННЯ =================
        function openModal() {
            document.getElementById('item-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = "Додати посилання";
            document.getElementById('edit-id').value = "";
            
            document.getElementById('item-title').value = "";
            document.getElementById('item-url').value = "";
            document.getElementById('item-reg-url').value = "";
            document.getElementById('item-category').value = activeTab === 'archive' ? 'news' : activeTab;
            document.getElementById('item-expire').value = "";
            document.getElementById('item-file').value = "";
            document.getElementById('item-image-url').value = "";
            
            localUploadedFile = null;
            resetImagePreview();
        }

        function closeModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        function previewUploadedImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            localUploadedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('item-image-url').value = ""; 
                setImagePreview(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        function previewUrlImage() {
            const url = document.getElementById('item-image-url').value.trim();
            if (url) {
                localUploadedFile = null;
                setImagePreview(url);
            } else {
                resetImagePreview();
            }
        }

        function setImagePreview(src) {
            const img = document.getElementById('img-preview');
            img.src = src;
            img.classList.remove('hidden');
            document.getElementById('preview-text').classList.add('hidden');
        }

        function resetImagePreview() {
            const img = document.getElementById('img-preview');
            img.src = "";
            img.classList.add('hidden');
            document.getElementById('preview-text').classList.remove('hidden');
        }

        // Завантаження фото в Supabase Storage (Public bucket 'hub-images')
        async function uploadFileToSupabase(file) {
            if (!supabaseClient) return "";
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
            const filePath = `images/${fileName}`;

            const { data, error } = await supabaseClient.storage
                .from('hub-images')
                .upload(filePath, file);

            if (error) throw error;

            const { data: { publicUrl } } = supabaseClient.storage
                .from('hub-images')
                .getPublicUrl(filePath);

            return publicUrl;
        }

        // Збереження картки в базу Supabase
        async function saveItem() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = "Збереження...";

            const editId = document.getElementById('edit-id').value;
            const title = document.getElementById('item-title').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const category = document.getElementById('item-category').value;
            const regUrl = document.getElementById('item-reg-url').value.trim();
            const expireDate = document.getElementById('item-expire').value;

            if (!title || !url) {
                alert("Заповніть назву та посилання!");
                saveBtn.disabled = false;
                saveBtn.textContent = "Зберегти";
                return;
            }

            try {
                let imageUrl = "";

                if (localUploadedFile && supabaseClient) {
                    imageUrl = await uploadFileToSupabase(localUploadedFile);
                } else {
                    imageUrl = document.getElementById('item-image-url').value.trim();
                }

                const dbPayload = {
                    title,
                    url,
                    category,
                    reg_url: regUrl || null,
                    expire_date: expireDate || null
                };

                if (imageUrl) {
                    dbPayload.image = imageUrl;
                }

                if (supabaseClient) {
                    if (editId) {
                        const { error } = await supabaseClient
                            .from('hub_items')
                            .update(dbPayload)
                            .eq('id', editId);
                        if (error) throw error;
                    } else {
                        dbPayload.position = items.length;
                        const { error } = await supabaseClient
                            .from('hub_items')
                            .insert([dbPayload]);
                        if (error) throw error;
                    }
                    closeModal();
                    await fetchItems();
                } else {
                    // Якщо Supabase не підключено — працюємо у пам'яті (демо-режим)
                    if (editId) {
                        const idx = items.findIndex(i => i.id === editId);
                        if (idx !== -1) {
                            items[idx] = { ...items[idx], title, url, category, regUrl, expireDate, image: imageUrl || items[idx].image };
                        }
                    } else {
                        items.push({ id: Date.now().toString(), title, url, category, regUrl, expireDate, image: imageUrl, position: items.length });
                    }
                    closeModal();
                    processDataAndRender();
                }
            } catch (err) {
                console.error("Помилка під час збереження:", err);
                alert("Помилка збереження.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "Зберегти";
            }
        }

        // Заповнення полів форми перед редагуванням
        function editItem(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;

            openModal();
            document.getElementById('modal-title').textContent = "Редагувати посилання";
            document.getElementById('edit-id').value = item.id;
            
            document.getElementById('item-title').value = item.title;
            document.getElementById('item-url').value = item.url;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-reg-url').value = item.regUrl || "";
            document.getElementById('item-expire').value = item.expireDate || "";
            
            if (item.image) {
                if (item.image.startsWith("data:image") || item.image.includes('supabase.co/storage')) {
                    setImagePreview(item.image);
                } else {
                    document.getElementById('item-image-url').value = item.image;
                    setImagePreview(item.image);
                }
            }
        }

        // Видалення
        async function deleteItem(itemId) {
            if (confirm("Ви дійсно хочете видалити це посилання?")) {
                if (supabaseClient) {
                    try {
                        const { error } = await supabaseClient
                            .from('hub_items')
                            .delete()
                            .eq('id', itemId);

                        if (error) {
                            console.error(error);
                            alert("Не вдалося видалити елемент з хмари.");
                        } else {
                            await fetchItems();
                        }
                    } catch (delErr) {
                        console.error("Помилка видалення:", delErr);
                    }
                } else {
                    items = items.filter(i => i.id !== itemId);
                    processDataAndRender();
                }
            }
        }
    </script>
</body>
