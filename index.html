            const clearBtn = document.getElementById('clear-search-btn');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const val = e.target.value.trim();
                    if (val === '') {
                        searchQuery = '';
                        if (clearBtn) clearBtn.classList.add('hidden');
                        renderCards();
                    } else {
                        if (clearBtn) clearBtn.classList.remove('hidden');
                    }
                });
            }
        })();

        async function fetchItems() {
            if (!supabaseClient) {
                console.log("Завантаження дефолтних посилань (локальний режим)...");
                items = DEFAULT_ITEMS;
                processDataAndRender();
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('hub_items')
                    .select('*')
                    .order('position', { ascending: true });

                if (error) {
                    console.error("Помилка зв'язку з Supabase, завантажуємо локальний бекап:", error);
                    items = DEFAULT_ITEMS;
                    processDataAndRender();
                    return;
                }

                if (data.length === 0) {
                    console.log("База даних порожня. Запускаємо автозаповнення демо-даними...");
                    
                    const seedData = DEFAULT_ITEMS.map((item, idx) => ({
                        title: item.title,
                        url: item.url,
                        category: item.category,
                        image: item.image,
                        reg_url: item.regUrl || null,
                        expire_date: item.expireDate || null,
                        position: idx
                    }));

                    const { data: seededData, error: seedError } = await supabaseClient
                        .from('hub_items')
                        .insert(seedData)
                        .select();

                    if (seedError) {
                        console.error("Не вдалося виконати автозаповнення:", seedError);
                        items = DEFAULT_ITEMS;
                    } else {
                        items = seededData.map(row => ({
                            id: row.id,
                            title: row.title,
                            url: row.url,
                            category: row.category,
                            image: row.image,
                            regUrl: row.reg_url,
                            expireDate: row.expire_date,
                            position: row.position
                        }));
                    }
                } else {
                    items = data.map(row => ({
                        id: row.id,
                        title: row.title,
                        url: row.url,
                        category: row.category,
                        image: row.image,
                        regUrl: row.reg_url,
                        expireDate: row.expire_date,
                        position: row.position
                    }));
                }
            } catch (dbErr) {
                console.error("Помилка роботи з БД, увімкнено резервний режим:", dbErr);
                items = DEFAULT_ITEMS;
            }

            processDataAndRender();
        }

        function processDataAndRender() {
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            const activeCounts = { news: 0, events: 0, materials: 0 };

            processedItems = items.map(item => {
                let currentCategory = item.category;
                let isExpired = false;

                if (item.expireDate) {
                    const expire = new Date(item.expireDate);
                    expire.setHours(0, 0, 0, 0);
                    if (expire < now) {
                        isExpired = true;
                    }
                }

                if (isExpired) {
                    currentCategory = 'archive_materials';
                } else {
                    if (['news', 'events', 'materials'].includes(item.category)) {
                        if (activeCounts[item.category] < 10) {
                            activeCounts[item.category]++;
                            currentCategory = item.category;
                        } else {
                            if (item.category === 'materials') {
                                currentCategory = 'archive_useful';
                            } else {
                                currentCategory = 'archive_materials';
                            }
                        }
                    } else {
                        currentCategory = item.category;
                    }
                }

                return { ...item, currentCategory, isExpired };
            });

            renderTabs();
            renderCards();
        }

        function renderTabs() {
            const mainTabsContainer = document.getElementById('tabs-container');
            const subTabsContainer = document.getElementById('archive-tabs-container');
            const subtabsInner = document.getElementById('archive-subtabs');

            if (inArchiveView || inVpoView) {
                mainTabsContainer.classList.add('hidden');
                subTabsContainer.classList.remove('hidden');

                subtabsInner.innerHTML = '';
                const currentSubCats = inArchiveView ? ARCHIVE_CATEGORIES : VPO_CATEGORIES;

                Object.keys(currentSubCats).forEach(catId => {
                    const isActive = catId === activeTab;
                    const activeClasses = "text-primary border-b-2 border-primary";
                    const inactiveClasses = "text-gray-500 hover:text-primary";
                    
                    const btn = document.createElement('button');
                    btn.className = `flex-1 text-center pb-2.5 transition-all focus:outline-none ${isActive ? activeClasses : inactiveClasses}`;
                    btn.textContent = currentSubCats[catId];
                    btn.onclick = () => {
                        clearSearch();
                        activeTab = catId;
                        renderTabs();
                        renderCards();
                    };
                    subtabsInner.appendChild(btn);
                });

            } else {
                mainTabsContainer.classList.remove('hidden');
                subTabsContainer.classList.add('hidden');

                mainTabsContainer.innerHTML = '';
                Object.keys(MAIN_CATEGORIES).forEach(catId => {
                    const isActive = catId === activeTab;
                    const activeClasses = "text-primary border-b-2 border-primary";
                    const inactiveClasses = "text-gray-500 hover:text-primary";
                    
                    const btn = document.createElement('button');
                    btn.className = `flex-1 text-center pb-2.5 transition-all focus:outline-none text-[11px] xs:text-xs ${isActive ? activeClasses : inactiveClasses}`;
                    btn.textContent = MAIN_CATEGORIES[catId];
                    btn.onclick = () => {
                        clearSearch();
                        if (catId === 'archive') {
                            inArchiveView = true;
                            inVpoView = false;
                            activeTab = 'archive_materials';
                        } else if (catId === 'vpo') {
                            inArchiveView = false;
                            inVpoView = true;
                            activeTab = 'vpo_materials';
                        } else {
                            inArchiveView = false;
                            inVpoView = false;
                            activeTab = catId;
                        }
                        renderTabs();
                        renderCards();
                    };
                    mainTabsContainer.appendChild(btn);
                });
            }
        }

        function exitSubView() {
            clearSearch();
            inArchiveView = false;
            inVpoView = false;
            activeTab = 'news';
            renderTabs();
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('content-container');
            container.innerHTML = '';

            let filtered = [];

            if (searchQuery) {
                // Глобальний адаптивний пошук по всіх існуючих картках
                filtered = processedItems.filter(item => matchAdaptive(item.title, searchQuery));
            } else {
                // Звичайне фільтрування за активною вкладкою
                filtered = processedItems.filter(item => item.currentCategory === activeTab);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-12 text-sm">Тут поки нічого немає...</div>`;
                return;
            }

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "relative bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:scale-[1.01] transition-all duration-200 cursor-pointer";
                
                // Вимикаємо drag & drop сортування під час пошуку, щоб запобігти зсуву індексів різних категорій
                if (isAdmin && !searchQuery) {
                    card.setAttribute('draggable', 'true');
                    card.addEventListener('dragstart', (e) => handleDragStart(e, index));
                    card.addEventListener('dragover', handleDragOver);
                    card.addEventListener('drop', (e) => handleDrop(e, index));
                    card.addEventListener('dragend', handleDragEnd);
                }

                card.onclick = (e) => {
                    if (e.target.closest('.admin-control') || e.target.closest('a') || e.target.closest('button')) return;
                    window.open(item.url, '_blank');
                };

                let actionButtons = '';
                if (item.regUrl) {
                    actionButtons = `
                        <div class="mt-4 flex gap-2 border-t pt-3 admin-control">
                            <a href="${item.url}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 border border-primary text-primary rounded-lg hover:bg-gray-50 transition">
                                Детальніше
                            </a>
                            ${item.isExpired ? `
                                <button disabled class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-gray-200 text-gray-400 rounded-lg cursor-not-allowed">
                                    Завершено
                                </button>
                            ` : `
                                <a href="${item.regUrl}" target="_blank" class="flex-1 text-center text-xs font-semibold py-2.5 px-3 bg-primary text-white rounded-lg hover:bg-opacity-95 transition">
                                    Зареєструватись
                                </a>
                            `}
                        </div>
                    `;
                }

                const adminMenuHTML = isAdmin ? `
                    <div class="absolute right-2 top-2 admin-control z-20">
                        <button onclick="toggleDropdown(event, '${item.id}')" class="p-1 rounded-full hover:bg-gray-100 text-gray-500 hover:text-gray-800 transition focus:outline-none">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                        </button>
                        <div id="dropdown-${item.id}" class="hidden absolute right-0 mt-1 w-28 bg-white border border-gray-200 rounded-lg shadow-xl text-xs overflow-hidden z-30">
                            <button onclick="editItem('${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-100 text-navy font-semibold border-b border-gray-100">Редагувати</button>
                            <button onclick="deleteItem('${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-50 text-crimson font-semibold border-b border-gray-100">Видалити</button>
                            <button onclick="toggleDropdown(event, '${item.id}')" class="w-full text-left px-3 py-2.5 hover:bg-gray-50 text-gray-400 font-semibold">Скасувати</button>
                        </div>
                    </div>
                    <div class="absolute left-2 top-2 text-gray-300 admin-control pointer-events-none">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M9 11H7V9h2v2zm4-2h-2v2h2V9zm4 0h-2v2h2V9zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"></path></svg>
                    </div>
                ` : '';

                card.innerHTML = `
                    ${adminMenuHTML}
                    <div class="p-4 ${isAdmin && !searchQuery ? 'pl-8' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-24 aspect-[547/318] bg-gray-100 rounded-lg flex-shrink-0 overflow-hidden border border-gray-100">
                                <img class="w-full h-full object-cover" src="${item.image}" alt="${item.title}" onerror="this.src='https://placehold.co/547x318/f3f4f6/9ca3af?text=No+Photo'">
                            </div>
                            <div class="flex-grow">
                                <h3 class="font-semibold text-sm leading-snug text-gray-900">${item.title}</h3>
                            </div>
                        </div>
                        ${actionButtons}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ================= АДАПТИВНИЙ ПОШУК =================
        function getUkrainianStems(text) {
            return text
                .toLowerCase()
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?\"']/g, "") // видалення пунктуації
                .split(/\s+/)
                .filter(word => word.length > 0)
                .map(word => {
                    if (word.length <= 3) return word;
                    // Відкидання поширених закінчень для пошуку за основою
                    return word
                        .replace(/(ими|ями|ові|еві|ами|ями|иму)$/, '')
                        .replace(/(ий|ій|ому|ему|ах|ях|ів|ях)$/, '')
                        .replace(/(и|і|а|я|у|е|о)$/, '');
                });
        }

        function matchAdaptive(title, query) {
            const queryStems = getUkrainianStems(query);
            const titleClean = title.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?\"']/g, "");
            
            if (queryStems.length === 0) return false;

            // Картка підходить, якщо в її назві присутні всі основи слів із запиту
            return queryStems.every(stem => titleClean.includes(stem));
        }

        function performSearch() {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchQuery = searchInput.value.trim().toLowerCase();
                renderCards();
            }
        }

        function clearSearch() {
            searchQuery = '';
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.value = '';
            }
            const clearBtn = document.getElementById('clear-search-btn');
            if (clearBtn) {
                clearBtn.classList.add('hidden');
            }
        }

        function clearSearchInput() {
            clearSearch();
            renderCards();
        }

        // ================= АВТОРИЗАЦІЯ =================
        function openLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('admin-password').focus();
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('admin-password').value = '';
            document.getElementById('login-error').classList.add('hidden');
        }

        function login() {
            const pass = document.getElementById('admin-password').value;
            if (pass === '6Vf–sneN=}N;:!n7NO8F') {
                sessionStorage.setItem('sss_is_admin', 'true');
                enableAdminMode();
                closeLoginModal();
                processDataAndRender();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            sessionStorage.removeItem('sss_is_admin');
            isAdmin = false;
            document.getElementById('admin-bar').classList.add('hidden');
            document.getElementById('login-btn').classList.remove('hidden');
            processDataAndRender();
        }

        function enableAdminMode() {
            isAdmin = true;
            document.getElementById('admin-bar').classList.remove('hidden');
            document.getElementById('login-btn').classList.add('hidden');
        }

        // ================= DRAG & DROP СОРТУВАННЯ =================
        let draggedIndex = null;

        function handleDragStart(e, index) {
            draggedIndex = index;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) { e.preventDefault(); }

        async function handleDrop(e, targetIndex) {
            e.preventDefault();
            if (draggedIndex === null || draggedIndex === targetIndex) return;

            const activeItems = processedItems.filter(i => i.currentCategory === activeTab);
            const draggedItem = activeItems[draggedIndex];
            const targetItem = activeItems[targetIndex];

            const globalDraggedIdx = items.findIndex(i => i.id === draggedItem.id);
            const globalTargetIdx = items.findIndex(i => i.id === targetItem.id);

            if (globalDraggedIdx !== -1 && globalTargetIdx !== -1) {
                const [removed] = items.splice(globalDraggedIdx, 1);
                items.splice(globalTargetIdx, 0, removed);

                const updates = items.map((item, idx) => ({
                    id: item.id,
                    title: item.title,
                    url: item.url,
                    category: item.category,
                    image: item.image,
                    reg_url: item.regUrl || null,
                    expire_date: item.expireDate || null,
                    position: idx
                }));

                if (supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from('hub_items').upsert(updates);
                        if (error) console.error("Помилка збереження сортування:", error);
                    } catch (dragErr) {
                        console.error("Помилка збереження позицій в БД:", dragErr);
                    }
                }

                processDataAndRender();
            }
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedIndex = null;
        }

        // ================= КЕРУВАННЯ МЕНЮ КАРТКИ =================
        function toggleDropdown(e, itemId) {
            e.stopPropagation();
            const targetDropdown = document.getElementById(`dropdown-${itemId}`);
            
            if (activeDropdownId && activeDropdownId !== itemId) {
                const prev = document.getElementById(`dropdown-${activeDropdownId}`);
                if (prev) prev.classList.add('hidden');
            }

            if (targetDropdown) {
                targetDropdown.classList.toggle('hidden');
                activeDropdownId = targetDropdown.classList.contains('hidden') ? null : itemId;
            }
        }

        document.addEventListener('click', () => {
            if (activeDropdownId) {
                const dropdown = document.getElementById(`dropdown-${activeDropdownId}`);
                if (dropdown) dropdown.classList.add('hidden');
                activeDropdownId = null;
            }
        });

        // ================= КЕРУВАННЯ МОДАЛЬНИМИ ВІКНАМИ =================
        function openModal() {
            document.getElementById('item-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = "Додати посилання";
            document.getElementById('edit-id').value = "";
            
            document.getElementById('item-title').value = "";
            document.getElementById('item-url').value = "";
            document.getElementById('item-reg-url').value = "";
            
            const isArchive = activeTab === 'archive_materials' || activeTab === 'archive_useful';
            const isVpo = activeTab === 'vpo_materials' || activeTab === 'vpo_links';
            
            if (isArchive) {
                document.getElementById('item-category').value = 'news';
            } else if (isVpo) {
                document.getElementById('item-category').value = activeTab;
            } else {
                document.getElementById('item-category').value = activeTab;
            }
            
            document.getElementById('item-file').value = "";
            document.getElementById('item-image-url').value = "";
            
            if (fpInstance) fpInstance.clear();
            
            localUploadedFile = null;
            resetImagePreview();
        }

        function closeModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        function previewUploadedImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            localUploadedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('item-image-url').value = ""; 
                setImagePreview(e.target.result);
            }
            reader.readAsDataURL(file);
        }

        function previewUrlImage() {
            const url = document.getElementById('item-image-url').value.trim();
            if (url) {
                localUploadedFile = null;
                setImagePreview(url);
            } else {
                resetImagePreview();
            }
        }

        function setImagePreview(src) {
            const img = document.getElementById('img-preview');
            img.src = src;
            img.classList.remove('hidden');
            document.getElementById('preview-text').classList.add('hidden');
        }

        function resetImagePreview() {
            const img = document.getElementById('img-preview');
            img.src = "";
            img.classList.add('hidden');
            document.getElementById('preview-text').classList.remove('hidden');
        }

        async function uploadFileToSupabase(file) {
            if (!supabaseClient) return "";
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
            const filePath = `images/${fileName}`;

            const { data, error } = await supabaseClient.storage
                .from('hub-images')
                .upload(filePath, file);

            if (error) throw error;

            const { data: { publicUrl } } = supabaseClient.storage
                .from('hub-images')
                .getPublicUrl(filePath);

            return publicUrl;
        }

        async function saveItem() {
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = "Збереження...";

            const editId = document.getElementById('edit-id').value;
            const title = document.getElementById('item-title').value.trim();
            const url = document.getElementById('item-url').value.trim();
            const category = document.getElementById('item-category').value;
            const regUrl = document.getElementById('item-reg-url').value.trim();
            const expireDate = document.getElementById('item-expire').value;

            if (!title || !url) {
                alert("Заповніть назву та посилання!");
                saveBtn.disabled = false;
                saveBtn.textContent = "Зберегти";
                return;
            }

            try {
                let imageUrl = "";

                if (localUploadedFile && supabaseClient) {
                    imageUrl = await uploadFileToSupabase(localUploadedFile);
                } else {
                    imageUrl = document.getElementById('item-image-url').value.trim();
                }

                const dbPayload = {
                    title,
                    url,
                    category,
                    reg_url: regUrl || null,
                    expire_date: expireDate || null
                };

                if (imageUrl) {
                    dbPayload.image = imageUrl;
                }

                if (supabaseClient) {
                    if (editId) {
                        const { error } = await supabaseClient
                            .from('hub_items')
                            .update(dbPayload)
                            .eq('id', editId);
                        if (error) throw error;
                    } else {
                        let minPos = 0;
                        if (items.length > 0) {
                            minPos = Math.min(...items.map(i => i.position || 0));
                        }
                        dbPayload.position = minPos - 1;

                        const { error } = await supabaseClient
                            .from('hub_items')
                            .insert([dbPayload]);
                        if (error) throw error;
                    }
                    closeModal();
                    await fetchItems();
                } else {
                    if (editId) {
                        const idx = items.findIndex(i => i.id === editId);
                        if (idx !== -1) {
                            items[idx] = { ...items[idx], title, url, category, regUrl, expireDate, image: imageUrl || items[idx].image };
                        }
                    } else {
                        let minPos = 0;
                        if (items.length > 0) {
                            minPos = Math.min(...items.map(i => i.position || 0));
                        }
                        items.unshift({ 
                            id: Date.now().toString(), 
                            title, 
                            url, 
                            category, 
                            regUrl, 
                            expireDate, 
                            image: imageUrl, 
                            position: minPos - 1 
                        });
                    }
                    closeModal();
                    processDataAndRender();
                }
            } catch (err) {
                console.error("Помилка під час збереження:", err);
                alert("Помилка збереження.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = "Зберегти";
            }
        }

        function editItem(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item) return;

            openModal();
            document.getElementById('modal-title').textContent = "Редагувати посилання";
            document.getElementById('edit-id').value = item.id;
            
            document.getElementById('item-title').value = item.title;
            document.getElementById('item-url').value = item.url;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-reg-url').value = item.regUrl || "";
            
            if (item.expireDate && fpInstance) {
                fpInstance.setDate(item.expireDate);
            } else if (fpInstance) {
                fpInstance.clear();
            }
            
            if (item.image) {
                if (item.image.startsWith("data:image") || item.image.includes('supabase.co/storage')) {
                    setImagePreview(item.image);
                } else {
                    document.getElementById('item-image-url').value = item.image;
                    setImagePreview(item.image);
                }
            }
        }

        async function deleteItem(itemId) {
            if (confirm("Ви дійсно хочете видалити це посилання?")) {
                if (supabaseClient) {
                    try {
                        const { error } = await supabaseClient
                            .from('hub_items')
                            .delete()
                            .eq('id', itemId);

                        if (error) {
                            console.error(error);
                            alert("Не вдалося видалити елемент з хмари.");
                        } else {
                            await fetchItems();
                        }
                    } catch (delErr) {
                        console.error("Помилка видалення:", delErr);
                    }
                } else {
                    items = items.filter(i => i.id !== itemId);
                    processDataAndRender();
                }
            }
        }
    </script>
